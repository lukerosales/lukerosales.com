<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>War Room</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #f8f6f2; --text: #0d0d0d; --muted: #6b6760;
    --red: #cc2222; --green: #16a34a; --border: #d8d4cc;
    --surface: #f3f0ea; --surface2: #ece8e0;
    --mono: 'IBM Plex Mono', monospace;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: var(--bg); color: var(--text); font-family: var(--mono); font-size: 14px; line-height: 1.6; }

  /* LOGIN */
  #login {
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    min-height: 100vh; gap: 14px; padding: 28px;
  }
  #login h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; }
  #login p  { font-size: 11px; color: var(--muted); }
  #pw-input {
    font-family: var(--mono); font-size: 14px; padding: 12px 16px;
    border: 1px solid var(--border); background: var(--surface);
    width: 280px; outline: none; text-align: center; letter-spacing: 0.1em;
  }
  #pw-input:focus { border-color: var(--text); }
  #login-btn {
    font-family: var(--mono); font-size: 13px; font-weight: 600;
    padding: 12px 0; background: var(--text); color: var(--bg);
    border: none; cursor: pointer; width: 280px;
  }
  #login-btn:hover { opacity: 0.85; }
  #login-err { font-size: 12px; color: var(--red); display: none; }

  /* PANEL */
  #panel { display: none; max-width: 680px; margin: 0 auto; padding: 40px 28px 120px; }
  .top-bar {
    display: flex; justify-content: space-between; align-items: center;
    border-bottom: 2px solid var(--text); padding-bottom: 14px; margin-bottom: 40px;
  }
  .top-bar h1 { font-size: 14px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; }
  .out-btn {
    font-family: var(--mono); font-size: 11px; color: var(--muted);
    background: none; border: 1px solid var(--border); padding: 6px 12px; cursor: pointer;
  }

  .section { margin-bottom: 44px; }
  .section-label {
    font-size: 10px; text-transform: uppercase; letter-spacing: 0.2em;
    color: var(--muted); border-bottom: 1px solid var(--border);
    padding-bottom: 8px; margin-bottom: 16px;
  }

  .row { display: flex; align-items: center; gap: 14px; margin-bottom: 10px; }
  .row label { font-size: 12px; color: var(--muted); min-width: 130px; }
  .row input {
    font-family: var(--mono); font-size: 13px; padding: 9px 12px;
    border: 1px solid var(--border); background: var(--surface); flex: 1; outline: none;
  }
  .row input:focus { border-color: var(--text); }

  .card-row {
    display: flex; align-items: center; gap: 14px;
    padding: 12px 0; border-bottom: 1px solid var(--border);
  }
  .card-info { flex: 1; }
  .card-name { font-size: 13px; font-weight: 500; }
  .card-meta { font-size: 10px; color: var(--muted); margin-top: 2px; }
  .closed-tag {
    font-size: 9px; color: var(--green); border: 1px solid var(--green);
    padding: 1px 5px; margin-left: 6px; vertical-align: middle;
  }
  .card-row input {
    font-family: var(--mono); font-size: 13px; padding: 9px 12px;
    border: 1px solid var(--border); background: var(--surface); width: 150px; outline: none;
  }
  .card-row input:focus { border-color: var(--text); }
  .card-row input[readonly] { color: var(--muted); background: var(--surface2); cursor: not-allowed; }

  .add-form {
    display: grid; grid-template-columns: 140px 1fr 110px 130px auto;
    gap: 8px; margin-bottom: 16px;
  }
  .add-form input, .add-form select {
    font-family: var(--mono); font-size: 12px; padding: 8px 10px;
    border: 1px solid var(--border); background: var(--surface); outline: none;
  }
  .add-form input:focus, .add-form select:focus { border-color: var(--text); }
  .add-form button {
    font-family: var(--mono); font-size: 12px; font-weight: 600;
    padding: 8px 14px; background: var(--text); color: var(--bg);
    border: none; cursor: pointer; white-space: nowrap;
  }

  .txn-item {
    display: grid; grid-template-columns: 100px 90px 1fr 90px 30px;
    gap: 10px; align-items: center; padding: 10px 0;
    border-bottom: 1px solid var(--border); font-size: 12px;
  }
  .badge {
    font-size: 9px; text-transform: uppercase; letter-spacing: 0.06em;
    padding: 2px 6px; border: 1px solid; white-space: nowrap;
  }
  .badge.payment  { color: var(--green); border-color: var(--green); }
  .badge.income   { color: #2563eb;      border-color: #2563eb; }
  .badge.interest { color: var(--red);   border-color: var(--red); }
  .badge.expense  { color: var(--muted); border-color: var(--muted); }
  .txn-desc { color: var(--muted); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .txn-amt  { font-weight: 600; text-align: right; }
  .del {
    background: none; border: 1px solid var(--border); color: var(--muted);
    font-size: 14px; cursor: pointer; width: 26px; height: 26px;
    display: flex; align-items: center; justify-content: center; padding: 0;
  }
  .del:hover { border-color: var(--red); color: var(--red); }

  /* SAVE BAR */
  .save-bar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: var(--bg); border-top: 2px solid var(--text);
    padding: 16px 28px; display: none; align-items: center; gap: 20px;
  }
  #save-btn {
    font-family: var(--mono); font-size: 13px; font-weight: 600;
    padding: 13px 36px; background: var(--text); color: var(--bg);
    border: none; cursor: pointer;
  }
  #save-btn:disabled { opacity: 0.4; cursor: not-allowed; }
  #save-btn:hover:not(:disabled) { opacity: 0.85; }
  #status { font-size: 12px; }
  #status.ok  { color: var(--green); }
  #status.err { color: var(--red); }
</style>
</head>
<body>

<div id="login">
  <h1>War Room ⚔️</h1>
  <p>lukerosales.com — ledger control</p>
  <input type="password" id="pw-input" placeholder="password" autocomplete="current-password">
  <button id="login-btn" onclick="login()">Enter</button>
  <span id="login-err">Wrong password.</span>
</div>

<div id="panel">
  <div class="top-bar">
    <h1>War Room ⚔️</h1>
    <button class="out-btn" onclick="logout()">Log out</button>
  </div>

  <div class="section">
    <p class="section-label">Debt Overview</p>
    <div class="row">
      <label>Current Debt ($)</label>
      <input type="number" id="f-current" step="0.01" min="0">
    </div>
    <div class="row">
      <label>Previous Debt ($)</label>
      <input type="number" id="f-prev" step="0.01" min="0">
    </div>
    <div class="row">
      <label>Last Updated</label>
      <input type="date" id="f-date">
    </div>
  </div>

  <div class="section">
    <p class="section-label">Card Balances</p>
    <div id="card-fields"></div>
  </div>

  <div class="section">
    <p class="section-label">Transactions</p>
    <div class="add-form">
      <input type="date" id="new-date">
      <input type="text"   id="new-desc"   placeholder="Description">
      <input type="number" id="new-amount" step="0.01" min="0" placeholder="Amount">
      <select id="new-type">
        <option value="payment">Payment</option>
        <option value="income">Income</option>
        <option value="interest">Interest</option>
        <option value="expense">Expense</option>
      </select>
      <button onclick="addTxn()">+ Add</button>
    </div>
    <div id="txn-list"></div>
  </div>
</div>

<div class="save-bar" id="save-bar">
  <button id="save-btn" onclick="save()">Save Changes</button>
  <span id="status"></span>
</div>

<script>
const FALLBACK = {
  startDebt: 71000, currentDebt: 53336.68, prevDebt: 54183.66, lastUpdated: '2026-05-29',
  cards: [
    { name: 'Chase Business Ink',       type: 'Business', balance: 34924.99, min: 765, limit: 50000, apr: 6.00 },
    { name: 'Blue Business Plus',       type: 'Business', balance: 12321.59, min: 472, limit: 15000, apr: 5.00 },
    { name: 'Chase Sapphire Preferred', type: 'Personal', balance:  4183.66, min:  95, limit:  5000, apr: 6.00 },
    { name: 'Blue Business Cash',       type: 'Business', balance:  1176.85, min:  45, limit: 10000, apr: 5.00 },
    { name: 'Amex Gold',                type: 'Personal', balance:   729.59, min:  30, limit:  1500, apr: 5.00 },
    { name: 'Member First (Secured)',   type: 'Personal', balance:     0.00, min:   0, limit:   250, apr: 14.29, closed: true },
    { name: 'Members Cash Rewards',     type: 'Personal', balance:     0.00, min:   0, limit:  3500, apr: 20.29, closed: true },
  ],
  transactions: [
    { date: '2026-05-28', desc: 'Chase Business Ink — monthly minimum', amount: 765,  type: 'payment'  },
    { date: '2026-05-28', desc: 'Blue Business Plus — monthly minimum', amount: 472,  type: 'payment'  },
    { date: '2026-05-28', desc: 'Chase Sapphire — monthly minimum',     amount:  95,  type: 'payment'  },
    { date: '2026-05-28', desc: 'Blue Business Cash — monthly minimum', amount:  45,  type: 'payment'  },
    { date: '2026-05-28', desc: 'Amex Gold — monthly minimum',          amount:  30,  type: 'payment'  },
    { date: '2026-05-06', desc: 'Interest charged — business cards',    amount: 218,  type: 'interest' },
    { date: '2026-04-28', desc: 'Chase Business Ink — monthly minimum', amount: 765,  type: 'payment'  },
    { date: '2026-04-28', desc: 'Blue Business Plus — monthly minimum', amount: 472,  type: 'payment'  },
    { date: '2026-04-28', desc: 'Chase Sapphire — monthly minimum',     amount:  95,  type: 'payment'  },
    { date: '2026-04-28', desc: 'Blink partnership payment received',   amount: 3000, type: 'income'   },
    { date: '2026-04-07', desc: 'Interest charged — business cards',    amount: 221,  type: 'interest' },
  ],
};

let pw = '';
let data = null;

async function login() {
  pw = document.getElementById('pw-input').value.trim();
  if (!pw) return;

  let loaded;
  try {
    const res = await fetch('/api/data');
    loaded = res.ok ? await res.json() : null;
  } catch {}

  data = { ...FALLBACK, ...(loaded || {}) };

  document.getElementById('login').style.display = 'none';
  document.getElementById('panel').style.display  = 'block';
  document.getElementById('save-bar').style.display = 'flex';
  populate();
}

function logout() {
  pw = ''; data = null;
  document.getElementById('login').style.display  = 'flex';
  document.getElementById('panel').style.display  = 'none';
  document.getElementById('save-bar').style.display = 'none';
  document.getElementById('pw-input').value = '';
  document.getElementById('login-err').style.display = 'none';
}

document.getElementById('pw-input').addEventListener('keydown', e => { if (e.key === 'Enter') login(); });

function populate() {
  document.getElementById('f-current').value = data.currentDebt;
  document.getElementById('f-prev').value    = data.prevDebt;
  document.getElementById('f-date').value    = data.lastUpdated;
  document.getElementById('new-date').value  = new Date().toISOString().slice(0, 10);
  renderCards();
  renderTxns();
}

function renderCards() {
  document.getElementById('card-fields').innerHTML = data.cards.map((c, i) => `
    <div class="card-row">
      <div class="card-info">
        <div class="card-name">${c.name}${c.closed ? '<span class="closed-tag">CLOSED</span>' : ''}</div>
        <div class="card-meta">${c.type} · $${c.limit.toLocaleString()} limit · ${c.apr}% APR</div>
      </div>
      <input type="number" step="0.01" min="0"
             value="${c.balance.toFixed(2)}"
             data-idx="${i}"
             class="bal-input"
             ${c.closed ? 'readonly' : ''}>
    </div>
  `).join('');
}

function renderTxns() {
  const sorted = data.transactions
    .map((t, i) => ({ ...t, _i: i }))
    .sort((a, b) => new Date(b.date) - new Date(a.date));

  document.getElementById('txn-list').innerHTML = sorted.length
    ? sorted.map(t => `
        <div class="txn-item">
          <span style="font-size:12px;color:var(--muted)">${t.date}</span>
          <span class="badge ${t.type}">${t.type}</span>
          <span class="txn-desc">${t.desc}</span>
          <span class="txn-amt">$${Number(t.amount).toLocaleString()}</span>
          <button class="del" onclick="delTxn(${t._i})">×</button>
        </div>`).join('')
    : '<p style="font-size:12px;color:var(--muted);padding:10px 0">No transactions.</p>';
}

function delTxn(i) {
  data.transactions.splice(i, 1);
  renderTxns();
}

function addTxn() {
  const date   = document.getElementById('new-date').value;
  const desc   = document.getElementById('new-desc').value.trim();
  const amount = parseFloat(document.getElementById('new-amount').value);
  const type   = document.getElementById('new-type').value;
  if (!date || !desc || isNaN(amount) || amount <= 0) { alert('Fill in all fields.'); return; }
  data.transactions.push({ date, desc, amount, type });
  document.getElementById('new-desc').value   = '';
  document.getElementById('new-amount').value = '';
  renderTxns();
}

async function save() {
  data.currentDebt = parseFloat(document.getElementById('f-current').value) || 0;
  data.prevDebt    = parseFloat(document.getElementById('f-prev').value)    || 0;
  data.lastUpdated = document.getElementById('f-date').value;

  document.querySelectorAll('.bal-input').forEach(inp => {
    const i = parseInt(inp.dataset.idx);
    if (!data.cards[i].closed) data.cards[i].balance = parseFloat(inp.value) || 0;
  });

  const btn = document.getElementById('save-btn');
  const st  = document.getElementById('status');
  btn.disabled = true; btn.textContent = 'Saving...'; st.textContent = ''; st.className = '';

  try {
    const res = await fetch('/api/admin', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ password: pw, data }),
    });
    if (res.status === 401) {
      st.textContent = 'Wrong password.'; st.className = 'err';
    } else if (!res.ok) {
      throw new Error();
    } else {
      st.textContent = 'Saved. Site is live.'; st.className = 'ok';
    }
  } catch {
    st.textContent = 'Error saving. Try again.'; st.className = 'err';
  } finally {
    btn.disabled = false; btn.textContent = 'Save Changes';
  }
}
</script>
</body>
</html>
